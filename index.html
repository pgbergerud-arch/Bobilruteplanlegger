<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Værrute — beste campingvær akkurat nå</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b1d26;
    --panel: #10242f;
    --panel-2: #142c39;
    --line: #24404d;
    --text: #e8ede9;
    --text-dim: #9fb4bd;
    --amber: #f2a65a;
    --amber-dim: #7a5c38;
    --fjord: #4c7a8c;
    --good: #6fbf8f;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
    background: linear-gradient(180deg, var(--panel-2), var(--bg));
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    margin: 0;
    letter-spacing: 0.2px;
  }
  header h1 span {
    color: var(--amber);
  }
  #ticker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  #ticker strong {
    color: var(--amber);
    font-weight: 700;
  }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: 0;
  }
  #map { width: 100%; height: 100%; background: var(--bg); }
  aside {
    border-left: 1px solid var(--line);
    overflow-y: auto;
    background: var(--panel);
  }
  .meta {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--panel);
    text-align: left;
    padding: 8px 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--line);
    cursor: default;
  }
  tbody tr {
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  tbody tr:hover, tbody tr.active {
    background: var(--panel-2);
  }
  tbody td {
    padding: 9px 10px;
    vertical-align: middle;
  }
  .rank {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    width: 26px;
  }
  .rank.top1 { color: var(--amber); font-weight: 700; }
  .name { font-weight: 500; }
  .num {
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .scorebar {
    display: inline-block;
    width: 34px;
    height: 6px;
    border-radius: 3px;
    background: var(--line);
    position: relative;
    overflow: hidden;
    margin-right: 6px;
    vertical-align: middle;
  }
  .scorebar > i {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--fjord), var(--amber));
  }
  footer {
    padding: 8px 18px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
  }
  #loading, #empty {
    padding: 40px 18px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-align: center;
  }
  .leaflet-popup-content-wrapper {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .leaflet-popup-tip { background: var(--panel); }
  .popup-name { font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin-bottom: 4px; }
  .popup-stats { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    aside { border-left: none; border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>

<header>
  <h1>Vær<span>rute</span></h1>
  <div id="ticker">Laster siste kjøring …</div>
</header>

<main>
  <div id="map"></div>
  <aside>
    <div class="meta" id="meta">—</div>
    <div id="loading">Henter results.json …</div>
    <table id="tbl" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Sted</th>
          <th style="text-align:right">Score</th>
          <th style="text-align:right">°C</th>
          <th style="text-align:right">Sol</th>
          <th style="text-align:right">Vind</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </aside>
</main>

<footer>Data: open-meteo.com · Oppdateres daglig via GitHub Actions</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const map = L.map('map', { zoomControl: true }).setView([60.5, 10], 5);

  // Mørkt kartlag som passer paletten
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 18,
  }).addTo(map);

  const markers = [];

  function colorForScore(score, min, max) {
    const t = max > min ? (score - min) / (max - min) : 0.5;
    // interpoler mellom fjord-bla (#4C7A8C) og amber (#F2A65A)
    const c1 = [76, 122, 140];
    const c2 = [242, 166, 90];
    const c = c1.map((v, i) => Math.round(v + (c2[i] - v) * t));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  async function load() {
    try {
      const res = await fetch('results.json?_=' + Date.now());
      if (!res.ok) throw new Error('Fant ikke results.json ennå');
      const data = await res.json();
      render(data);
    } catch (err) {
      document.getElementById('loading').textContent =
        'Ingen data ennå — vent til workflowen har kjørt minst én gang.';
      document.getElementById('ticker').textContent = 'Ingen kjøring registrert ennå.';
    }
  }

  function render(data) {
    const places = data.places || [];
    if (!places.length) {
      document.getElementById('loading').textContent = 'Tom resultatliste.';
      return;
    }

    const scores = places.map(p => p.score);
    const min = Math.min(...scores), max = Math.max(...scores);
    const best = places[0];

    const updated = new Date(data.updated);
    document.getElementById('ticker').innerHTML =
      `→ Best akkurat nå: <strong>${best.name}</strong> · ${best.avg_temp_c}°C · ${best.avg_sun_hours}t sol · ${best.avg_wind_kmh} km/h vind`;
    document.getElementById('meta').textContent =
      `${places.length} steder · ${data.days} dagers snitt · oppdatert ${updated.toLocaleString('no-NO')}`;

    places.forEach((p, i) => {
      const color = colorForScore(p.score, min, max);
      const radius = 6 + (p.score - min) / (max - min || 1) * 10;
      const marker = L.circleMarker([p.lat, p.lon], {
        radius,
        color,
        fillColor: color,
        fillOpacity: 0.75,
        weight: i === 0 ? 2 : 1,
      }).addTo(map);
      marker.bindPopup(
        `<div class="popup-name">#${p.rank} ${p.name}</div>` +
        `<div class="popup-stats">${p.avg_temp_c}°C · ${p.avg_sun_hours}t sol · ${p.avg_wind_kmh} km/h vind · ${p.avg_precip_prob}% nedbør</div>`
      );
      markers.push(marker);
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    places.forEach((p, i) => {
      const tr = document.createElement('tr');
      const barWidth = Math.round(((p.score - min) / (max - min || 1)) * 100);
      tr.innerHTML = `
        <td class="rank ${i === 0 ? 'top1' : ''}">${p.rank}</td>
        <td class="name">${p.name}</td>
        <td class="num"><span class="scorebar"><i style="width:${barWidth}%"></i></span>${p.score}</td>
        <td class="num">${p.avg_temp_c}</td>
        <td class="num">${p.avg_sun_hours}t</td>
        <td class="num">${p.avg_wind_kmh}</td>
      `;
      tr.addEventListener('click', () => {
        map.setView([p.lat, p.lon], 9, { animate: true });
        markers[i].openPopup();
        document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('active'));
        tr.classList.add('active');
      });
      tbody.appendChild(tr);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('tbl').style.display = 'table';
  }

  load();
</script>
</body>
</html>
